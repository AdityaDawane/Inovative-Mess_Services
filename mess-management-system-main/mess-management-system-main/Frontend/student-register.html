<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration - Mess Management</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
    <div class="auth-card">
        <h2>Student Registration</h2>
        
        <div id="message"></div>

        <form id="registrationForm">
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" name="fullName" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" minlength="6" required>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required>
            </div>

            <button type="submit" class="btn btn-primary" id="submitBtn">
                Register
            </button>
        </form>

        <div class="auth-links">
            <p>Already have an account? <a href="student-login.html">Login here</a></p>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        const form = document.getElementById('registrationForm');
        const messageDiv = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Clear previous messages
            messageDiv.innerHTML = '';

            // Get form data
            const formData = {
                fullName: document.getElementById('fullName').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                password: document.getElementById('password').value
            };

            const confirmPassword = document.getElementById('confirmPassword').value;

            // Validate passwords match
            if (formData.password !== confirmPassword) {
                messageDiv.innerHTML = '<div class="alert alert-error">Passwords do not match!</div>';
                return;
            }

            try {
                UI.showLoading(submitBtn);

                const response = await API.customer.register(formData);

                if (response.success) {
                    messageDiv.innerHTML = '<div class="alert alert-success">Registration successful! Redirecting to login...</div>';
                    
                    setTimeout(() => {
                        window.location.href = 'student-login.html';
                    }, 2000);
                }
            } catch (error) {
                messageDiv.innerHTML = `<div class="alert alert-error">${error.message}</div>`;
                UI.hideLoading(submitBtn, 'Register');
            }
        });
    </script>
</body>
</html>
