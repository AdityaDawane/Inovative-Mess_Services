<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login - Mess Management</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
    <div class="auth-card">
        <h2>Student Login</h2>
        
        <div id="message"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>

            <button type="submit" class="btn btn-primary" id="submitBtn">
                Login
            </button>
        </form>

        <div class="auth-links">
            <p>Don't have an account? <a href="student-register.html">Register here</a></p>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        const form = document.getElementById('loginForm');
        const messageDiv = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                UI.showLoading(submitBtn);

                const response = await API.customer.login(email, password);

                if (response.success) {
                    // Save auth data
                    Auth.saveToken(
                        response.data.token,
                        response.data.userId,
                        response.data.role
                    );

                    // Redirect to dashboard
                    window.location.href = 'student-dashboard.html';
                }
            } catch (error) {
                messageDiv.innerHTML = `<div class="alert alert-error">${error.message}</div>`;
                UI.hideLoading(submitBtn, 'Login');
            }
        });
    </script>
</body>
</html>
